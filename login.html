<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Khushi Fashion Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="main-container">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
    <div class="shape shape-4"></div>
    <div class="shape shape-5"></div>
    <div class="shape shape-6"></div>

    <div class="login-box">
        <div class="brand-name">YOUR LOGO</div>
        <h2>Login</h2>
        
        <form action="#" method="POST">
            <div class="input-field">
                <label>Email</label>
                <input type="email" name="email" placeholder="username@gmail.com" required>
            </div>
            
            <div class="input-field">
                <label>Password</label>
                <input type="password" name="password" placeholder="Password" required>
                </div>
            
            <a href="#" class="forgot-pass">Forgot Password?</a>
            
            <button type="submit" class="btn-signin">Sign in</button>
        </form>
        
        <div class="separator">
            <span>or continue with</span>
        </div>
        
       <div class="social-login">
    <button class="btn-social google">
        <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google">
    </button>
    <button class="btn-social github">
        <img src="https://admin.github.com/assets/images/octicons/mark-github.svg" alt="Github">
    </button>
    <button class="btn-social facebook">
        <img src="https://upload.wikimedia.org/wikipedia/commons/b/b9/2023_Facebook_logo.svg" alt="Facebook">
    </button>
  </div>
        
        <p class="register-text">Don't have an account? <a href="#">Register for free</a></p>
    </div>
</div>

</body>
</html>
