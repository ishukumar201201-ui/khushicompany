<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Khushi Fashion Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-container">
    <div class="login-card">
        <div class="brand-logo">
            <h1 class="brand-name">KHUSHI<span>FASHION</span></h1>
        </div>
        <h2>Welcome Back</h2>
        <p>Login in</p>
        
        <form class="login-form">
            <div class="input-group">
                <input type="email" required placeholder="Email Address">
            </div>
            <div class="input-group">
                <input type="password" required placeholder="Password">
            </div>
            <button type="submit" class="btn-login-ultra">
                <span>LOGIN NOW</span>
                <div class="btn-glow"></div>
            </button>
        </form>

        <div class="social-separator">
            <span>OR LOGIN WITH</span>
        </div>
        <div class="social-login-group">
            <button class="btn-social google">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google"> Google
            </button>
            <button class="btn-social facebook">
                <img src="https://upload.wikimedia.org/wikipedia/commons/b/b9/2023_Facebook_logo.svg" alt="Facebook"> Facebook
            </button>
        </div>
        
        <div class="login-footer">
            <a href="#">Forgot Password?</a>
            <p>Don't have an account? <a href="#">Sign Up</a></p>
        </div>
    </div>
</div>

</body>
</html>
