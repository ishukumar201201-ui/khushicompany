<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Cart | Khushi Fashion</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent: #FF914D; --bg: #050505; --card: #121212; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: #fff; padding: 40px 20px; }

        .cart-wrapper { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 2fr 1fr; gap: 30px; }
        
        /* Left Section */
        .items-container { background: var(--card); border-radius: 24px; padding: 30px; border: 1px solid #222; }
        .cart-header { font-family: 'Syncopate', sans-serif; font-size: 24px; color: var(--accent); margin-bottom: 30px; border-bottom: 1px solid #222; padding-bottom: 15px; }
        
        .item-row { display: grid; grid-template-columns: 120px 1fr auto; gap: 20px; align-items: center; padding: 20px 0; border-bottom: 1px solid #222; }
        .item-row img { width: 100%; height: 150px; object-fit: cover; border-radius: 16px; border: 1px solid #333; }
        
        .item-info h3 { font-size: 20px; margin-bottom: 8px; }
        .item-info p { color: #888; font-size: 14px; }
        
        .qty-box { display: flex; align-items: center; gap: 15px; margin-top: 15px; background: #1a1a1a; width: fit-content; padding: 8px 15px; border-radius: 12px; }
        .qty-box button { background: none; border: none; color: var(--accent); font-size: 20px; cursor: pointer; font-weight: bold; }
        .qty-box span { font-weight: bold; min-width: 20px; text-align: center; }

        .price-tag { font-size: 22px; font-weight: 700; color: var(--accent); }

        /* Right Section: Summary */
        .summary-box { background: var(--card); border-radius: 24px; padding: 30px; border: 1px solid #222; height: fit-content; position: sticky; top: 20px; }
        .summary-box h2 { font-family: 'Syncopate', sans-serif; font-size: 18px; margin-bottom: 25px; }
        .line { display: flex; justify-content: space-between; margin-bottom: 15px; color: #aaa; }
        .total-line { border-top: 1px solid #222; padding-top: 20px; margin-top: 20px; font-size: 22px; font-weight: 700; color: #fff; }

        .pay-btn { width: 100%; padding: 20px; background: var(--accent); color: #000; border: none; border-radius: 16px; font-weight: 900; font-size: 16px; cursor: pointer; margin-top: 25px; transition: 0.3s; text-transform: uppercase; }
        .pay-btn:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(255, 145, 77, 0.3); }

        @media (max-width: 900px) { .cart-wrapper { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="cart-wrapper">
        <div class="items-container" id="cart-items">
            </div>

        <div class="summary-box">
            <h2>Order Summary</h2>
            <div class="line"><span>Subtotal</span><span id="sub-price">₹0</span></div>
            <div class="line"><span>Shipping</span><span style="color: #00ff00;">FREE</span></div>
            <div class="line"><span>Taxes (GST)</span><span>₹0</span></div>
            <div class="line total-line"><span>Total</span><span id="total-price">₹0</span></div>
            <button class="pay-btn" onclick="alert('Proceeding to Secure Payment...')">Secure Checkout</button>
        </div>
    </div>

    <script>
        const products = {
            'women': { name: 'Royal Traditional Saree', price: 2499, img: 'women-cat.png' },
            'men': { name: 'Premium Cotton Shirt', price: 899, img: 'mens-cat.jpg' },
            'kids': { name: 'Cool Kids Denim', price: 1200, img: 'kids-cat.png' }
        };

        const params = new URLSearchParams(window.location.search);
        const pKey = params.get('p') || 'women'; 
        const item = products[pKey];

        const container = document.getElementById('cart-items');
        container.innerHTML = `
            <h1 class="cart-header">SHOPPING BAG</h1>
            <div class="item-row">
                <img src="${item.img}" alt="Product">
                <div class="item-info">
                    <h3>${item.name}</h3>
                    <p>SKU: KF-2026-001 | Premium Quality</p>
                    <div class="qty-box">
                        <button onclick="changeQty(-1)">-</button>
                        <span id="qty-val">1</span>
                        <button onclick="changeQty(1)">+</button>
                    </div>
                </div>
                <div class="price-tag">₹${item.price}</div>
            </div>
        `;

        function updateTotals(q) {
            const total = item.price * q;
            document.getElementById('sub-price').innerText = '₹' + total;
            document.getElementById('total-price').innerText = '₹' + total;
        }

        function changeQty(n) {
            let q = document.getElementById('qty-val');
            let val = parseInt(q.innerText) + n;
            if(val < 1) val = 1;
            q.innerText = val;
            updateTotals(val);
        }
        
        updateTotals(1); // Initial load
    </script>
</body>
</html>
