<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Premium Cart | Khushi Fashion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background: #050505;">

    <script>
    // 1. Product Data (Sabse alag details)
    const products = {
        'women': { name: 'Royal Traditional Saree', price: 2499, img: 'women-cat.png' },
        'men': { name: 'Premium Cotton Shirt', price: 899, img: 'mens-cat.jpg' },
        'kids': { name: 'Cool Kids Denim', price: 1200, img: 'kids-cat.png' }
    };

    // 2. URL se pata karo kaun sa product hai
    const urlParams = new URLSearchParams(window.location.search);
    const productKey = urlParams.get('p') || 'women'; // Default women agar kuch na mile
    const selectedProduct = products[productKey];

    // 3. Page par details fill karo
    document.querySelector('.cart-items-section').innerHTML = `
        <h1 class="cart-title">Your Bag</h1>
        <div class="cart-item-card">
            <img src="${selectedProduct.img}" alt="Product">
            <div class="cart-item-details">
                <h3>${selectedProduct.name}</h3>
                <p>Size: M | Color: Premium</p>
                <div class="qty-control">
                    <button onclick="updateQty(-1)">-</button>
                    <span id="qty">1</span>
                    <button onclick="updateQty(1)">+</button>
                </div>
            </div>
            <div class="cart-item-price">
                <p class="new-price">₹${selectedProduct.price}</p>
            </div>
        </div>
    `;

    // Bill Summary update karne ke liye
    function updateBill(qty) {
        const total = selectedProduct.price * qty;
        document.querySelector('.summary-line span:last-child').innerText = '₹' + total;
        document.querySelector('.total-line span:last-child').innerText = '₹' + total;
    }

    function updateQty(change) {
        let qtySpan = document.getElementById('qty');
        let currentQty = parseInt(qtySpan.innerText);
        currentQty += change;
        if (currentQty < 1) currentQty = 1;
        qtySpan.innerText = currentQty;
        updateBill(currentQty);
    }
</script>

</body>
</html>
