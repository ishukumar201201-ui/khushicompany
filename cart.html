<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Premium Cart | Khushi Fashion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background: #050505;">

    <div class="cart-wrapper">
        <div class="cart-items-section">
            <h1 class="cart-title">Your Bag <span>(2 Items)</span></h1>
            
            <div class="cart-item-card">
                <img src="women-cat.png" alt="Product">
                <img src="mens.cat.jpg" alt="Product">
                <img src="kids-cat.png" alt="Product">
                <div class="cart-item-details">
                    <h3>Royal Traditional Saree</h3>
                    <p>Size: M | Color: Gold</p>
                    <div class="qty-control">
                        <button>-</button><span>1</span><button>+</button>
                    </div>
                </div>
                <div class="cart-item-price">
                    <p class="new-price">₹2,499</p>
                    <button class="remove-item">Remove</button>
                </div>
            </div>
            </div>

        <div class="cart-summary-section">
            <div class="summary-card">
                <h2>Order Summary</h2>
                <div class="summary-line">
                    <span>Subtotal</span>
                    <span>₹2,499</span>
                </div>
                <div class="summary-line">
                    <span>Shipping</span>
                    <span style="color: #00ff00;">FREE</span>
                </div>
                <hr>
                <div class="total-line">
                    <span>Total</span>
                    <span>₹2,499</span>
                </div>
                <button class="checkout-btn">PROCEED TO PAY</button>
                <p class="secure-text">🔒 256-bit Secure Encryption</p>
            </div>
        </div>
    </div>

</body>
</html>
